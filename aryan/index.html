<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aryan Finance - BRD</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="min-h-screen bg-white flex selection:bg-[#1E3A8A] selection:text-white font-sans">
    <!-- Sidebar - Desktop -->
    <aside class="hidden lg:flex w-72 h-screen sticky top-0 bg-white border-r border-slate-100 flex-col shrink-0">
        <div class="p-8 flex flex-col gap-4 border-b border-slate-100 bg-white">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 bg-[#1E3A8A] flex items-center justify-center rounded-sm shadow-lg shadow-blue-900/20">
                    <div class="w-2 h-2 bg-white rotate-45"></div>
                </div>
                <h1 class="font-black tracking-tight text-base leading-tight uppercase text-[#1E3A8A]">
                    Aryan Finance
                </h1>
            </div>
        </div>
        
        <nav class="flex-1 overflow-y-auto p-4 space-y-1" id="desktop-nav">
            <!-- Nav items injected here -->
        </nav>
        
        <footer class="p-8 border-t border-slate-50 flex flex-col gap-4">
            <div class="flex items-center gap-3">
              <div class="w-2 h-2 rounded-full bg-blue-500 animate-pulse"></div>
              <span class="text-[9px] font-black uppercase tracking-widest text-slate-400" id="confidential-text">
                Internal Business Document • Confidential
              </span>
            </div>
        </footer>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 min-w-0 bg-white relative">
        <!-- Header -->
        <header class="sticky top-0 z-40 bg-white border-b border-slate-100 flex flex-col pt-4">
            <div class="flex items-center justify-between px-6 lg:px-12 mb-4">
                <div class="flex items-center gap-4">
                    <button id="mobile-menu-open" class="lg:hidden p-2 hover:bg-slate-50 rounded-sm">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-[#1E3A8A]"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
                    </button>
                    <div class="flex flex-col">
                        <span class="font-black text-xs uppercase tracking-[0.2em] text-[#1E3A8A]">Aryan Finance</span>
                        <span class="text-[9px] font-black uppercase tracking-[0.1em] text-[#0ea5e9]" id="header-page-title">
                            Business Requirement Doc
                        </span>
                    </div>
                </div>

                <div class="hidden xl:flex items-center gap-4">
                    <button id="print-btn" class="flex items-center gap-2 px-5 py-2.5 border border-slate-200 text-[10px] font-black text-slate-500 hover:bg-slate-50 transition-all cursor-pointer uppercase tracking-widest rounded-sm">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                        PDF
                    </button>
                </div>
            </div>

            <!-- Global Action Bar - The 3 Buttons -->
            <div class="px-4 pb-4 overflow-x-auto scrollbar-hide">
                <div class="max-w-4xl mx-auto flex items-center justify-center gap-2 sm:gap-4 min-w-max">
                    <button data-page="requirement" id="top-nav-brd" class="flex-1 sm:flex-none px-6 py-3 rounded-sm text-[10px] font-black uppercase tracking-widest transition-all bg-[#1E3A8A] text-white shadow-lg shadow-blue-900/20 border-2 border-[#1E3A8A]">
                        1. Business Requirement
                    </button>
                    <button data-page="understand" id="top-nav-understand" class="flex-1 sm:flex-none px-6 py-3 rounded-sm text-[10px] font-black uppercase tracking-widest transition-all bg-white text-slate-400 border-2 border-slate-100 hover:border-[#1E3A8A] hover:text-[#1E3A8A]">
                        2. Understand Business
                    </button>
                    <button id="lang-toggle" class="flex-1 sm:flex-none px-6 py-3 rounded-sm text-[10px] font-black uppercase tracking-widest transition-all bg-amber-50 text-amber-600 border-2 border-amber-200 hover:bg-amber-600 hover:text-white hover:border-amber-600">
                        Language: EN
                    </button>
                </div>
            </div>
        </header>

        <div class="max-w-4xl mx-auto px-6 lg:px-12">
            <!-- Hero -->
            <div class="py-20 lg:py-32 border-b border-slate-100 flex flex-col gap-12 sm:flex-row sm:items-end sm:justify-between mb-20 animate-fade-in">
                <div class="space-y-8">
                  <div id="hero-badge" class="inline-flex items-center gap-3 text-[#0ea5e9] font-mono text-[9px] font-black tracking-[0.5em] uppercase bg-blue-50 px-4 py-1.5 border border-blue-100">
                    Business Requirement Doc
                  </div>
                  <h1 id="hero-title" class="text-6xl lg:text-9xl font-black text-[#1E3A8A] tracking-tighter leading-[0.8] font-sans uppercase">
                    Aryan <br /> 
                    Finance
                  </h1>
                </div>
                <div class="flex flex-col justify-end space-y-6">
                  <div class="w-12 h-1 bg-[#0ea5e9]"></div>
                  <p id="hero-desc" class="text-slate-400 text-sm leading-relaxed max-w-sm font-bold tracking-tight uppercase">
                    ಒಂದು ಸಂಪೂರ್ಣ subscription ಮತ್ತು lottery ವ್ಯವಹಾರ ನಿರ್ವಹಣಾ ವ್ಯವಸ್ಥೆ.
                  </p>
                </div>
            </div>

            <!-- Content Container -->
            <div id="content-sections" class="space-y-32 pb-32">
                <!-- Sections injected here -->
            </div>
        </div>

        <div class="py-12 border-t border-slate-100 text-center">
            <p class="text-[10px] font-black uppercase tracking-[0.5em] text-slate-300">© 2024 Aryan Finance Global</p>
        </div>
    </main>

    <!-- Mobile Sidebar -->
    <div id="mobile-sidebar" class="fixed inset-0 z-50 lg:hidden pointer-events-none transition-opacity duration-300 opacity-0 bg-slate-900/60 backdrop-blur-sm">
        <div class="w-full max-w-xs h-full bg-white flex flex-col pointer-events-auto transform transition-transform duration-300 -translate-x-full" id="mobile-sidebar-content">
            <div class="p-6 flex items-center justify-between border-b border-slate-100">
                <h1 class="font-black text-sm uppercase tracking-widest text-[#1E3A8A]">Aryan Finance</h1>
                <button id="mobile-menu-close" class="p-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-slate-400 hover:text-[#1E3A8A]"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            </div>

            <nav class="flex-1 overflow-y-auto p-6 space-y-2" id="mobile-nav">
                <!-- Nav items injected here -->
            </nav>
        </div>
    </div>

    <!-- Script at root -->
    <script src="script.js"></script>
</body>
</html>
